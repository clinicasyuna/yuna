<!--
  ============================================================
  YUNA CHAT ASSISTENTE — Widget para Acompanhantes
  ============================================================
  COMO INSTALAR:
  1. Abra o arquivo: yuna/acompanhantes/index.html
  2. Cole TODO o conteúdo abaixo ANTES da tag </body>
  3. Salve e faça git push
  ============================================================
  IMPORTANTE: Substitua SUA_CHAVE_AQUI pela sua chave da API
  Anthropic: https://console.anthropic.com/
  ============================================================
-->

<!-- ── BOTÃO FLUTUANTE ── -->
<button id="yuna-fab" onclick="yunaToggleChat()" aria-label="Abrir assistente Yuna" style="
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #0F6E56;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9998;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  transition: background 0.2s, transform 0.15s;
">
  <svg id="yuna-fab-icon" width="26" height="26" viewBox="0 0 24 24" fill="none">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
      stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <!-- Ícone X (aparece quando aberto) -->
  <svg id="yuna-fab-close" width="22" height="22" viewBox="0 0 24 24" fill="none" style="display:none">
    <path d="M18 6L6 18M6 6l12 12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>

<!-- Badge de notificação -->
<span id="yuna-badge" style="
  position: fixed;
  bottom: 68px;
  right: 22px;
  background: #e53e3e;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  border: 2px solid #fff;
">1</span>

<!-- ── JANELA DO CHAT ── -->
<div id="yuna-chat-window" style="
  position: fixed;
  bottom: 92px;
  right: 24px;
  width: 340px;
  max-height: 580px;
  background: #fff;
  border-radius: 20px;
  border: 1px solid rgba(0,0,0,0.1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.14);
  display: none;
  flex-direction: column;
  z-index: 9997;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
">

  <!-- Header -->
  <div style="background:#0F6E56;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;">
    <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="rgba(255,255,255,0.25)"/>
        <path d="M8 13.5C8.5 15 10 16 12 16s3.5-1 4-2.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="9.5" cy="10.5" r="1" fill="#fff"/>
        <circle cx="14.5" cy="10.5" r="1" fill="#fff"/>
      </svg>
    </div>
    <div style="flex:1;">
      <div style="color:#fff;font-size:13px;font-weight:600;">Yuna Assistente</div>
      <div style="color:rgba(255,255,255,0.8);font-size:11px;display:flex;align-items:center;gap:4px;">
        <span style="width:6px;height:6px;border-radius:50%;background:#86efac;display:inline-block;"></span>
        Online agora
      </div>
    </div>
    <button onclick="yunaToggleChat()" style="background:none;border:none;cursor:pointer;padding:4px;color:rgba(255,255,255,0.7);font-size:18px;line-height:1;">✕</button>
  </div>

  <!-- Área de mensagens -->
  <div id="yuna-msgs" style="
    flex:1;
    overflow-y:auto;
    padding:14px 12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#f8f9fa;
    min-height:300px;
    max-height:380px;
  "></div>

  <!-- Atalhos rápidos -->
  <div id="yuna-quick" style="
    padding:8px 10px 4px;
    background:#f8f9fa;
    border-top:1px solid rgba(0,0,0,0.06);
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    flex-shrink:0;
  ">
    <button onclick="yunaSendQuick('Qual o status da minha solicitação?')"
      style="font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;white-space:nowrap;">
      Minhas solicitações
    </button>
    <button onclick="yunaSendQuick('Quero pedir uma refeição especial')"
      style="font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;white-space:nowrap;">
      Pedir refeição
    </button>
    <button onclick="yunaSendQuick('Preciso de ajuda com o quarto')"
      style="font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;white-space:nowrap;">
      Ajuda com o quarto
    </button>
    <button onclick="yunaSendQuick('Quero falar com a equipe')"
      style="font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;white-space:nowrap;">
      Falar com equipe
    </button>
  </div>

  <!-- Input -->
  <div style="
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 12px 14px;
    background:#fff;
    border-top:1px solid rgba(0,0,0,0.08);
    flex-shrink:0;
  ">
    <textarea id="yuna-input"
      placeholder="Digite sua mensagem..."
      rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();yunaSend();}"
      oninput="this.style.height='36px';this.style.height=Math.min(this.scrollHeight,80)+'px'"
      style="
        flex:1;
        font-size:13px;
        padding:8px 12px;
        border-radius:20px;
        border:1px solid #d1d5db;
        background:#f9fafb;
        color:#111;
        outline:none;
        resize:none;
        height:36px;
        font-family:inherit;
        line-height:1.4;
      "
    ></textarea>
    <button id="yuna-send-btn" onclick="yunaSend()" style="
      width:36px;height:36px;
      border-radius:50%;
      background:#0F6E56;
      border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      transition:background 0.2s;
    ">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── SCRIPT DO CHAT ── -->
<script>
(function() {

  // ============================================================
  // ⚠️  SUBSTITUA PELA SUA CHAVE DA API ANTHROPIC
  // Obtenha em: https://console.anthropic.com/
  // ============================================================
  const ANTHROPIC_API_KEY = 'SUA_CHAVE_AQUI';
  // ============================================================

  let chatAberto = false;
  let enviando = false;
  let historico = [];

  // Tenta pegar dados do usuário logado do sistema Yuna existente
  function getDadosUsuario() {
    try {
      // Tenta ler do localStorage onde o sistema Yuna armazena a sessão
      const user = JSON.parse(localStorage.getItem('yunaUser') || localStorage.getItem('currentUser') || '{}');
      return {
        nome: user.name || user.nome || user.displayName || 'Acompanhante',
        quarto: user.room || user.quarto || user.roomNumber || '---',
        email: user.email || ''
      };
    } catch(e) {
      return { nome: 'Acompanhante', quarto: '---', email: '' };
    }
  }

  function getSystemPrompt() {
    const u = getDadosUsuario();
    return `Você é a Yuna Assistente, um chatbot de suporte humanizado para acompanhantes e familiares de pacientes internados nas Clínicas Yuna.

Dados do acompanhante logado:
- Nome: ${u.nome}
- Quarto/Leito: ${u.quarto}
- Email: ${u.email}

Suas responsabilidades:
- Responder dúvidas sobre o funcionamento do hospital e do portal Yuna Solicite
- Ajudar o acompanhante a entender como abrir uma solicitação (Manutenção, Nutrição, Higienização, Hotelaria)
- Explicar o status das solicitações quando perguntado
- Orientar sobre horários de visita, regras gerais e serviços disponíveis
- Acolher acompanhantes que estejam ansiosos ou com dúvidas

Regras importantes:
- Responda SEMPRE em português do Brasil, de forma calorosa e empática
- Seja conciso: respostas curtas, parágrafos de no máximo 2-3 frases
- Para urgências médicas: encaminhe IMEDIATAMENTE para a enfermagem (ramal 190)
- Nunca dê diagnósticos ou opiniões médicas
- Para abrir solicitações, oriente o acompanhante a usar os cards na tela principal do portal
- Se não souber algo específico do hospital, diga que vai verificar com a equipe
- Trate o acompanhante pelo primeiro nome sempre que possível`;
  }

  function agora() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function addMensagem(role, texto) {
    const msgs = document.getElementById('yuna-msgs');
    const isBot = role === 'bot';

    const div = document.createElement('div');
    div.style.cssText = `display:flex;flex-direction:column;max-width:85%;${isBot ? 'align-self:flex-start' : 'align-self:flex-end'}`;

    const bubble = document.createElement('div');
    bubble.style.cssText = isBot
      ? 'padding:9px 12px;border-radius:16px 16px 16px 4px;font-size:13px;line-height:1.55;background:#fff;border:1px solid rgba(0,0,0,0.09);color:#111;'
      : 'padding:9px 12px;border-radius:16px 16px 4px 16px;font-size:13px;line-height:1.55;background:#0F6E56;color:#fff;';
    bubble.textContent = texto;

    const time = document.createElement('div');
    time.style.cssText = `font-size:10px;color:#9ca3af;margin-top:3px;padding:0 2px;${isBot ? '' : 'text-align:right'}`;
    time.textContent = agora();

    div.appendChild(bubble);
    div.appendChild(time);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const msgs = document.getElementById('yuna-msgs');
    const div = document.createElement('div');
    div.id = 'yuna-typing';
    div.style.cssText = 'align-self:flex-start;';
    div.innerHTML = `<div style="
      padding:10px 14px;
      background:#fff;
      border:1px solid rgba(0,0,0,0.09);
      border-radius:16px 16px 16px 4px;
      display:flex;gap:5px;align-items:center;
    ">
      <span style="width:7px;height:7px;border-radius:50%;background:#9ca3af;animation:yunaBlink 1.2s infinite;display:inline-block;"></span>
      <span style="width:7px;height:7px;border-radius:50%;background:#9ca3af;animation:yunaBlink 1.2s 0.2s infinite;display:inline-block;"></span>
      <span style="width:7px;height:7px;border-radius:50%;background:#9ca3af;animation:yunaBlink 1.2s 0.4s infinite;display:inline-block;"></span>
    </div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('yuna-typing');
    if (el) el.remove();
  }

  async function chamarClaude(texto) {
    historico.push({ role: 'user', content: texto });

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        system: getSystemPrompt(),
        messages: historico
      })
    });

    if (!resp.ok) throw new Error('Erro na API: ' + resp.status);

    const data = await resp.json();
    const resposta = data.content?.map(b => b.text || '').join('') || 'Desculpe, não consegui processar. Tente novamente.';
    historico.push({ role: 'assistant', content: resposta });
    return resposta;
  }

  async function yunaSend() {
    if (enviando) return;
    const input = document.getElementById('yuna-input');
    const texto = input.value.trim();
    if (!texto) return;

    input.value = '';
    input.style.height = '36px';
    enviando = true;
    document.getElementById('yuna-send-btn').style.opacity = '0.5';
    document.getElementById('yuna-quick').style.display = 'none';

    addMensagem('user', texto);
    addTyping();

    try {
      const resposta = await chamarClaude(texto);
      removeTyping();
      addMensagem('bot', resposta);
    } catch(e) {
      removeTyping();
      addMensagem('bot', 'Houve um problema de conexão. Por favor, tente novamente em instantes.');
    }

    document.getElementById('yuna-send-btn').style.opacity = '1';
    enviando = false;
    input.focus();
  }

  function yunaSendQuick(texto) {
    document.getElementById('yuna-input').value = texto;
    yunaSend();
  }

  function yunaToggleChat() {
    chatAberto = !chatAberto;
    const win = document.getElementById('yuna-chat-window');
    const badge = document.getElementById('yuna-badge');
    const iconChat = document.getElementById('yuna-fab-icon');
    const iconClose = document.getElementById('yuna-fab-close');

    win.style.display = chatAberto ? 'flex' : 'none';
    badge.style.display = 'none';
    iconChat.style.display = chatAberto ? 'none' : 'block';
    iconClose.style.display = chatAberto ? 'block' : 'none';

    if (chatAberto && historico.length === 0) {
      const u = getDadosUsuario();
      const saudacao = u.nome && u.nome !== 'Acompanhante'
        ? `Olá, ${u.nome.split(' ')[0]}! Como posso ajudar você hoje?`
        : 'Olá! Sou a Yuna Assistente. Como posso ajudar você hoje?';
      addMensagem('bot', saudacao);
      setTimeout(() => input.focus(), 300);
    }
  }

  // Expõe funções globalmente
  window.yunaToggleChat = yunaToggleChat;
  window.yunaSendQuick = yunaSendQuick;
  window.yunaSend = yunaSend;

  const input = document.getElementById('yuna-input');

  // Injetar animação de typing
  const style = document.createElement('style');
  style.textContent = `
    @keyframes yunaBlink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    #yuna-fab:hover { background:#085041 !important; transform: scale(1.05); }
  `;
  document.head.appendChild(style);

})();
</script>
